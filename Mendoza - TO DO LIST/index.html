<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="todo-container">
        <header class="todo-header">
            <h1>TO DO</h1>
        </header>

        <form id="todo-form" class="todo-form" autocomplete="off">
            <input 
                type="text" 
                id="todo-input" 
                placeholder="What needs to be done?" 
                aria-label="New task input"
                required
            >
            <button type="submit" id="add-btn" aria-label="Add task">Add</button>
        </form>

        <ul id="todo-list" class="todo-list" aria-label="List of tasks"></ul>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
